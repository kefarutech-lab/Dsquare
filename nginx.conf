# DSquare Designs — nginx site config
# Place this file at: /etc/nginx/sites-available/dsquaredesigns.net
# Then: sudo ln -s /etc/nginx/sites-available/dsquaredesigns.net /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

# Hide nginx version from headers and error pages
server_tokens off;

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name dsquaredesigns.net www.dsquaredesigns.net;
    return 301 https://dsquaredesigns.net$request_uri;
}

# Redirect www → non-www (canonical domain)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.dsquaredesigns.net;

    ssl_certificate     /etc/letsencrypt/live/dsquaredesigns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dsquaredesigns.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://dsquaredesigns.net$request_uri;
}

# Main site
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dsquaredesigns.net;

    # SSL — certbot manages these
    ssl_certificate     /etc/letsencrypt/live/dsquaredesigns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dsquaredesigns.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # React build root
    root  /var/www/Dsquare/client/dist;
    index index.html;

    # Limit upload/request body size (protects against large payload attacks)
    client_max_body_size 5m;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml
                    application/font-woff application/font-woff2;

    # Cache static assets — 1 year (they are content-hashed by Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|otf)$ {
        expires            1y;
        add_header         Cache-Control "public, immutable";
        access_log         off;
    }

    # Proxy /api/* to Node.js backend
    location /api/ {
        proxy_pass             http://127.0.0.1:5000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade              $http_upgrade;
        proxy_set_header       Connection           "upgrade";
        proxy_set_header       Host                 $host;
        proxy_set_header       X-Real-IP            $remote_addr;
        proxy_set_header       X-Forwarded-For      $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto    $scheme;
        proxy_cache_bypass     $http_upgrade;

        # Timeouts — prevent hanging connections if Node is slow/down
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;
    }

    # React SPA — all unknown routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
