# DSquare Designs — nginx site config
# Place this file at: /etc/nginx/sites-available/dsquaredesigns.net
# Then: sudo ln -s /etc/nginx/sites-available/dsquaredesigns.net /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name dsquaredesigns.net www.dsquaredesigns.net;

    # Redirect HTTP → HTTPS (certbot fills this in automatically)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dsquaredesigns.net www.dsquaredesigns.net;

    # SSL — certbot will manage these lines
    ssl_certificate     /etc/letsencrypt/live/dsquaredesigns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dsquaredesigns.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Serve React build
    root /home/kefaru/dsquare/client/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy /api/* to Node.js backend
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # React SPA — send all unknown routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
